<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zombie Defender - Sobreviva ao Apocalipse</title>
  <meta name="description"
    content="Um jogo de sobrevivência 2D top-down onde você defende sua base contra hordas de zumbis. Construído com Phaser 3.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>

  <div id="game-container">
    <!-- UI Overlay for HUD -->
    <div class="ui-overlay">
      <div class="hud">
        <div class="stats-card">
          <div class="label" id="credits-label">OURO</div>
          <div class="value" id="credit-count">0</div>
        </div>

        <div class="stats-card">
          <div class="label" id="player-life-label">HP JOGADOR</div>
          <div class="health-bar-container">
            <div id="player-hp-bar" class="health-bar-fill player-hp"></div>
          </div>
        </div>

        <div class="stats-card">
          <div class="label" id="base-life-label">INTEGRIDADE DA BASE</div>
          <div class="health-bar-container">
            <div id="base-hp-bar" class="health-bar-fill"></div>
          </div>
          <div class="label" id="wave-label" style="margin-top: 10px; font-size: 0.7rem;">DIFICULDADE: <span
              id="wave-number">1</span></div>
        </div>
      </div>
    </div>

    <!-- Upgrade Shop (Hidden by default) -->
    <div id="shop-menu" class="shop-menu">
      <h2 class="shop-title">UPGRADES</h2>

      <div id="upgrade-fire-rate" class="shop-item" aria-label="Aumentar cadência de tiro">
        <div class="upgrade-info">
          <span class="upgrade-name">Cadência de Tiro</span>
          <span class="upgrade-cost">Custo: <span id="cost-fire-rate">100</span></span>
        </div>
        <div class="label" id="lvl-fire-rate">LVL 1</div>
      </div>

      <div id="upgrade-damage" class="shop-item" aria-label="Aumentar dano">
        <div class="upgrade-info">
          <span class="upgrade-name">Dano</span>
          <span class="upgrade-cost">Custo: <span id="cost-damage">150</span></span>
        </div>
        <div class="label" id="lvl-damage">LVL 1</div>
      </div>

      <div id="repair-base" class="shop-item" aria-label="Reparar base">
        <div class="upgrade-info">
          <span class="upgrade-name">Reparar Base (+25%)</span>
          <span class="upgrade-cost">Custo: <span id="cost-repair">150</span></span>
        </div>
        <div class="label">REPARO</div>
      </div>

      <div id="fortify-base" class="shop-item" aria-label="Fortalecer base">
        <div class="upgrade-info">
          <span class="upgrade-name">Fortalecer Base (+HP Máx)</span>
          <span class="upgrade-cost">Custo: <span id="cost-fortify">300</span></span>
        </div>
        <div class="label" id="lvl-fortify">LVL 1</div>
      </div>

      <button id="btn-close-shop" class="btn-close">VOLTAR AO JOGO (P)</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>

</html>
